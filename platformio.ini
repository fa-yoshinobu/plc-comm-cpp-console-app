[platformio]
src_dir = .
boards_dir = boards

[env:m5stack-atom-console]
platform = espressif32@7.0.1
board = m5stack-atom
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_filters = send_on_enter
lib_deps =
    fa-yoshinobu/slmp-connect-cpp-minimal@0.8.0
build_flags =
    -DSLMP_MINIMAL_ENABLE_HIGH_LEVEL=0
build_src_filter =
    +<platformio/atom_matrix_serial_console_smoke.cpp>

[env:wiznet_6300_evb_pico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#aa70b802be8851668053d4f09734e4089fe41932
board = wiznet_6300_evb_pico2
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
lib_deps =
    fa-yoshinobu/slmp-connect-cpp-minimal@0.8.0
build_flags =
    -DSLMP_MINIMAL_ENABLE_HIGH_LEVEL=0
lib_ignore =
    ESPHost
    lwIP_ESPHost
    lwIP_CYW43
    lwIP_WINC1500
build_src_filter =
    +<platformio/w6300_evb_pico2_smoke.cpp>

[env:t-rss3-verification-console]
platform = espressif32@6.12.0
board = esp32s3_nopsram
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_filters = send_on_enter
lib_ldf_mode = deep+
extra_scripts = pre:scripts/plc_verification_build_metadata.py
check_tool = cppcheck
check_skip_packages = yes
check_src_filters =
    +<platformio/t_rss3_plc_verification_console_smoke.cpp>
    +<examples/t_rss3_plc_verification_console/t_rss3_plc_verification_console.cpp>
lib_deps =
    fa-yoshinobu/slmp-connect-cpp-minimal@3.1.0
    fa-yoshinobu/mcprotocol-serial-cpp@3.1.0
build_unflags =
    -std=gnu++11
    -std=gnu++14
build_flags =
    -std=gnu++17
    -include platformio/esp32_gcc8_string_view_compat.h
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSLMP_MINIMAL_ENABLE_HIGH_LEVEL=0
build_src_filter =
    +<platformio/t_rss3_plc_verification_console_smoke.cpp>
    +<examples/t_rss3_plc_verification_console/t_rss3_plc_verification_console.cpp>

[env:t-rss3-verification-console-local]
extends = env:t-rss3-verification-console
lib_deps =
    symlink://../plc-comm-slmp-cpp-minimal
    symlink://../plc-comm-mcprotocol-serial-cpp
build_flags =
    ${env:t-rss3-verification-console.build_flags}
    -DPLC_CONSOLE_SLMP_HAS_MXR_RJ71_PROFILE=1
    -DPLC_CONSOLE_SLMP_HAS_TRAFFIC_STATS=1

[env:stamplc-verification-console]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_eol = LF
monitor_filters = send_on_enter
lib_ldf_mode = deep+
extra_scripts = pre:scripts/plc_verification_build_metadata.py
check_tool = cppcheck
check_skip_packages = yes
check_flags =
    cppcheck: --suppress=uninitMemberVar:*M5GFX*
    cppcheck: --suppress=uninitMemberVarPrivate:*M5GFX*
    cppcheck: --suppress=uninitMemberVar:*M5Unified*
    cppcheck: --suppress=uninitMemberVarPrivate:*M5Unified*
check_src_filters =
    +<platformio/stamplc_plc_verification_console_smoke.cpp>
    +<examples/stamplc_plc_verification_console/stamplc_plc_verification_console.cpp>
    +<examples/stamplc_plc_verification_console/stamplc_protocol_console.cpp>
lib_deps =
    fa-yoshinobu/slmp-connect-cpp-minimal@3.1.0
    fa-yoshinobu/mcprotocol-serial-cpp@3.1.0
    m5stack/M5Unified@0.2.18
    m5stack/M5GFX@0.2.25
build_unflags =
    -std=gnu++11
    -std=gnu++14
build_flags =
    -std=gnu++17
    -include platformio/esp32_gcc8_string_view_compat.h
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPLC_CONSOLE_BOARD_STAMPLC=1
    -DSLMP_MINIMAL_ENABLE_HIGH_LEVEL=0
build_src_filter =
    +<platformio/stamplc_plc_verification_console_smoke.cpp>
    +<examples/stamplc_plc_verification_console/stamplc_plc_verification_console.cpp>
    +<examples/stamplc_plc_verification_console/stamplc_protocol_console.cpp>

[env:stamplc-verification-console-local]
extends = env:stamplc-verification-console
lib_deps =
    symlink://../plc-comm-slmp-cpp-minimal
    symlink://../plc-comm-mcprotocol-serial-cpp
    m5stack/M5Unified@0.2.18
    m5stack/M5GFX@0.2.25
build_flags =
    ${env:stamplc-verification-console.build_flags}
    -DPLC_CONSOLE_SLMP_HAS_MXR_RJ71_PROFILE=1
    -DPLC_CONSOLE_SLMP_HAS_TRAFFIC_STATS=1
