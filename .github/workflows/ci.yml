name: ci

on:
  push:
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        env:
          - m5stack-atom-console
          - wiznet_6300_evb_pico2
          - t-rss3-verification-console
          - stamplc-verification-console
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio==6.1.19
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
      - name: Analyze verification-console owned sources
        if: matrix.env == 't-rss3-verification-console' || matrix.env == 'stamplc-verification-console'
        run: pio check -e ${{ matrix.env }} --severity medium --severity high --fail-on-defect medium --fail-on-defect high
